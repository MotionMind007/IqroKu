version: 2
updates:
  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Jakarta
    open-pull-requests-limit: 5

  - package-ecosystem: pub
    directory: /iqroku_app
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: Asia/Jakarta
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: Asia/Jakarta
    open-pull-requests-limit: 5
