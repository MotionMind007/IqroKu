# Nginx config for IqroKu API
# Place at: /etc/nginx/sites-available/iqroku
# Symlink: ln -s /etc/nginx/sites-available/iqroku /etc/nginx/sites-enabled/

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=iqroku_auth:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=iqroku_api:10m rate=30r/s;

# Upstream
upstream iqroku_backend {
    server 127.0.0.1:8787;
    keepalive 16;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name iqroku.motionmind.store;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name iqroku.motionmind.store;

    # SSL (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/iqroku.motionmind.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/iqroku.motionmind.store/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Request limits
    client_max_body_size 6M;
    client_body_timeout 30s;
    client_header_timeout 15s;

    # Auth endpoints (stricter rate limit)
    location ~ ^/auth/ {
        limit_req zone=iqroku_auth burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://iqroku_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Admin (optional: restrict by IP)
    location ~ ^/admin {
        # Uncomment to restrict admin access to specific IPs:
        # allow YOUR_IP_HERE;
        # deny all;

        limit_req zone=iqroku_api burst=20 nodelay;

        proxy_pass http://iqroku_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Audio uploads/downloads
    location /uploads/ {
        alias /opt/iqroku/uploads/;
        expires 1h;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Health check (no rate limit)
    location = /health {
        proxy_pass http://iqroku_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # All other API routes
    location / {
        limit_req zone=iqroku_api burst=50 nodelay;
        limit_req_status 429;

        proxy_pass http://iqroku_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
}
